<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survive Hiroshima Bombing Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="bgContainer">
    <video id="bgVideo" muted loop playsinline preload="auto"></video>
    <canvas id="bgCanvas"></canvas>
    <div id="overlay"></div>
</div>

<div id="homeScreen" class="screen">
    <h1>Survive Hiroshima Bombing Simulator</h1>
    <div class="buttons">
        <button class="btn" onclick="showCustomization()">customization</button>
        <button class="btn" onclick="showBlack()">play</button>
    </div>
</div>

<div id="customizationScreen" class="screen hidden">
    <button class="btn btn-top-left" onclick="showHome()">back</button>
    <h2>Choose Your Character</h2>
    <div id="charGrid"></div>
    <button class="btn btn-select" onclick="showHome()">select</button>
</div>

<div id="blackScreen" class="screen hidden">
    <p class="back-hint">click anywhere to return</p>
</div>

<script src="script.js"></script>
</body>
</html>
